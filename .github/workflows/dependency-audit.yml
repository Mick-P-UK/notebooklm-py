# Runs pip-audit against the locked environment so a CVE landing in a
# transitive dep surfaces in CI rather than at next user install. The first
# release cycle uses ``continue-on-error`` to avoid blocking unrelated PRs
# while the policy beds in — flip to a hard fail in a follow-up PR.
name: dependency-audit

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/dependency-audit.yml"
  schedule:
    # Nightly at 06:00 UTC so transitive CVEs surface even when no PR
    # touches the manifest.
    - cron: "0 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync locked env (browser + dev + markdown)
        run: uv sync --frozen --extra browser --extra dev --extra markdown

      - name: Install pip-audit into the locked env
        # Pin pip-audit on the current major (2.x) so two consecutive nightly
        # runs use the same advisory-DB query logic — without this, a silent
        # bump to 3.x could change strictness without an accompanying PR.
        run: uv pip install 'pip-audit>=2.7.0,<3'

      - name: pip-audit (locked env)
        # Soft-launch: keep a transient advisory from blocking unrelated PRs
        # while the audit policy beds in. Remove ``continue-on-error`` after
        # the first release cycle so the audit becomes a hard merge gate.
        continue-on-error: true
        run: uv run pip-audit --strict
